front:
  text: 方等三昧行法序宋沙門遵式述山門教卷自唐季多流外國或尚存目録而莫見其文學者思之渺隔滄海方等三昧行法者皇宋咸平六祀日本僧寂照等齎至雖東國重來若西乾新譯載披載沃適奉醒醐竊念方等至尊禁法嚴密苟不克由聖範事出師心豈唯招無益之訶抑亦負餘殃之責南嶽師躬行七載理洞其微位淨六根言符先佛大師咨詢有在況發總持垂此典謨足可繩準今時或壇場延袤形像巍峨行法則半任臆裁律範則全由心匠縱謂七衆階節寧逾上首之科雖曰像多無妙要符表法之便將恐未除故業更貽新戚染衣增垢良用悲夫然此行法六篇後二不載者修行備百録止觀受戒具出本經存篇目者令知法有始終也
